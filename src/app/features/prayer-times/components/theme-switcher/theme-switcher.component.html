<div
  class="theme-switcher"
  [class.dark-active]="theme() === 'dark'"
  role="group"
  [attr.aria-label]="labels().themeGroupLabel"
  (click)="toggleTheme()"
>
  <div class="theme-slider"></div>
  <button
    type="button"
    class="theme-btn"
    [class.active]="theme() === 'light'"
    [title]="labels().themeDay"
    [attr.aria-label]="labels().themeDay"
  >
    <img src="assets/icons/day.png" alt="" class="theme-flag" width="18" height="18" aria-hidden="true" />
  </button>
  <button
    type="button"
    class="theme-btn"
    [class.active]="theme() === 'dark'"
    [title]="labels().themeNight"
    [attr.aria-label]="labels().themeNight"
  >
    <img src="assets/icons/night.png" alt="" class="theme-flag" width="18" height="18" aria-hidden="true" />
  </button>
</div>
