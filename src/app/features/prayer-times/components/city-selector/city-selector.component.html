<div class="city-selector">
  <button
    class="selector-trigger"
    (click)="toggleDropdown()"
    type="button"
    id="city-selector-trigger"
  >
    <svg class="selector-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
    <span class="selector-label">{{ selected()?.name ?? 'Odaberi grad' }}</span>
    <svg
      class="selector-chevron"
      [class.open]="isOpen()"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (isOpen()) {
    <div class="selector-dropdown">
      <div class="search-wrapper">
        <input
          type="text"
          class="search-input"
          placeholder="Pretraži grad..."
          [ngModel]="searchTerm()"
          (ngModelChange)="searchTerm.set($event)"
          id="city-search-input"
        />
      </div>
      <ul class="city-list">
        @for (location of filteredLocations(); track location.name) {
          <li>
            <button
              class="city-option"
              [class.active]="selected()?.name === location.name"
              (click)="selectCity(location)"
              type="button"
            >
              {{ location.name }}
            </button>
          </li>
        } @empty {
          <li class="no-results">Nema rezultata</li>
        }
      </ul>
    </div>
  }
</div>
