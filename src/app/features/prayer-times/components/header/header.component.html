<header class="app-header">
  <a
    routerLink="/"
    class="header-brand"
    [attr.aria-label]="labels().appTitle"
  >
    <img
      src="assets/icons/logo-small.png?v=10"
      alt=""
      class="header-logo"
      width="38"
      height="38"
    />
    <h1 class="header-title">{{ labels().appTitle }}</h1>
  </a>

  <!-- Desktop controls (hidden on mobile) -->
  <div class="header-desktop-controls">
    <a
      routerLink="/qibla"
      routerLinkActive="header-qibla--active"
      class="header-qibla"
      [title]="labels().qiblaTileSubtitle"
    >
      <span class="header-qibla-pad">
        <svg class="header-qibla-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none">
          <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.2" opacity="0.4" />
          <path d="M12 12V4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <circle cx="12" cy="12" r="2" fill="currentColor" />
        </svg>
        <span class="header-qibla-text">{{ labels().qiblaTileTitle }}</span>
      </span>
    </a>
    <app-method-switcher />
    <app-theme-switcher />
    <div
      class="lang-switcher"
      [class.en-active]="currentLang() === 'en'"
      id="lang-switcher-desktop"
      (click)="toggleLang()"
      role="group"
      aria-label="Language"
    >
      <div class="lang-slider"></div>
      <button type="button" class="lang-btn" [class.active]="currentLang() === 'bs'" title="Bosanski">
        <img src="assets/icons/bih.png" alt="BiH" class="lang-flag" />
        <span class="lang-code">BS</span>
      </button>
      <button type="button" class="lang-btn" [class.active]="currentLang() === 'en'" title="English">
        <img src="assets/icons/uk.png" alt="UK" class="lang-flag" />
        <span class="lang-code">EN</span>
      </button>
    </div>
  </div>

  <!-- Mobile controls -->
  <div class="header-mobile-controls">
    <a
      routerLink="/qibla"
      routerLinkActive="header-qibla--active"
      class="header-qibla header-qibla--icon-only"
      [title]="labels().qiblaTileSubtitle"
      [attr.aria-label]="labels().qiblaTileTitle"
    >
      <span class="header-qibla-pad">
        <svg class="header-qibla-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none">
          <circle cx="12" cy="12" r="9.5" stroke="currentColor" stroke-width="1.2" opacity="0.4" />
          <path d="M12 12V4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <circle cx="12" cy="12" r="2" fill="currentColor" />
        </svg>
      </span>
    </a>
    <!-- Language switcher (always visible on mobile, click-anywhere toggle) -->
    <div
      class="lang-switcher"
      [class.en-active]="currentLang() === 'en'"
      id="lang-switcher-mobile"
      (click)="toggleLang()"
      role="group"
      aria-label="Language"
    >
      <div class="lang-slider"></div>
      <button type="button" class="lang-btn" [class.active]="currentLang() === 'bs'" title="Bosanski">
        <img src="assets/icons/bih.png" alt="BiH" class="lang-flag" />
        <span class="lang-code">BS</span>
      </button>
      <button type="button" class="lang-btn" [class.active]="currentLang() === 'en'" title="English">
        <img src="assets/icons/uk.png" alt="UK" class="lang-flag" />
        <span class="lang-code">EN</span>
      </button>
    </div>

    <!-- Hamburger -->
    <button
      type="button"
      class="hamburger"
      [class.active]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle menu"
      id="nav-hamburger"
      [attr.aria-expanded]="menuOpen()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile dropdown: method + theme (directSelect mode, auto-close on pick) -->
  <div
    class="mobile-dropdown"
    [class.open]="menuOpen()"
    (touchstart)="onDrawerTouchStart($event)"
    (touchend)="onDrawerTouchEnd($event)"
  >
    <app-theme-switcher [directSelect]="true" (picked)="closeMenu()" />
    <app-method-switcher [directSelect]="true" (picked)="closeMenu()" />
  </div>
</header>
