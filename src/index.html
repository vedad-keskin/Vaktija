<!doctype html>
<html lang="bs">
<head>
  <meta charset="utf-8">
  <title>Vaktija</title>
  <base href="/">

  <meta name="theme-color" content="#0f1117">

  <!-- Link preview (Telegram, WhatsApp, etc.) — absolute og:image URL required by most crawlers -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Vaktija">
  <meta property="og:title" content="Vaktija — namaska vremena za BiH">

  <meta property="og:url" content="https://vaktija-bh.vercel.app/">
  <!-- Bump ?v when replacing banner.png so Telegram/WhatsApp fetch a fresh image (URLs are cache keys). -->
  <meta property="og:image" content="https://vaktija-bh.vercel.app/assets/icons/banner.png?v=4">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:alt" content="Vaktija — logo i naziv">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vaktija — namaska vremena za BiH">

  <link rel="icon" type="image/png" href="assets/icons/logo-small.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
